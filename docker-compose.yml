version: '3.8'

services:
  app:
    build: .
    restart: always
    networks:
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.palomino-tech.rule=Host(`palominotech.profissionalpalomino.com`)"
      - "traefik.http.routers.palomino-tech.entrypoints=websecure"
      - "traefik.http.routers.palomino-tech.tls.certresolver=letsencrypt"
      - "traefik.http.services.palomino-tech.loadbalancer.server.port=80"

networks:
  easypanel:
    external: true
